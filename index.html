<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcardit - Mobile Paragraph Flashcards</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flashcardit">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.6.347/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --success: #10b981;
            --text: #0f172a;
            --text-muted: #64748b;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        header {
            background-color: var(--card-bg);
            padding: 12px;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 10;
        }

        #app-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            box-sizing: border-box;
        }

        .install-banner {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 10px 14px;
            margin: 0 12px 12px 12px;
            border-radius: 10px;
            display: none;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            color: #1e40af;
        }

        .btn-install-now {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            width: auto;
        }

        .upload-container-row {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .flashcard-view {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            height: 60vh; 
            min-height: 350px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .card-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: hidden;
            background: #ffffff;
            position: relative;
            touch-action: none; 
        }

        .card-image-wrapper canvas {
            max-width: 100% !important;
            max-height: 100% !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain;
            display: block;
            transform-origin: center center;
            will-change: transform;
            transition: transform 0.05s ease-out;
        }

        .card-metadata-footer {
            height: 38px;
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
            z-index: 5;
        }
