<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Paragraph Flashcard Generator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Card Studio">
    
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --success: #10b981;
            --text: #0f172a;
            --text-muted: #64748b;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Changed to auto to completely restore native mobile vertical scrolling */
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        header {
            background-color: var(--card-bg);
            padding: 12px;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 10;
        }

        #app-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            box-sizing: border-box;
        }

        /* Native App Installation Banner Style */
        .install-banner {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 10px 14px;
            margin: 0 12px 12px 12px;
            border-radius: 10px;
            display: none;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            color: #1e40af;
        }

        .btn-install-now {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            width: auto;
        }

        .upload-container-row {
            width: 100%;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .flashcard-view {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            /* Uses a stable responsive height so it fits beautifully on mobile screens */
            height: 65vh; 
            min-height: 350px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .card-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: auto;
            background: #ffffff;
        }

        .card-image-wrapper canvas {
            max-width: 100% !important;
            max-height: 100% !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain;
            display: block;
        }

        .card-metadata-footer {
            height: 38px;
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .controls-row {
            display: flex;
            gap: 8px;
            width: 100%;
            padding: 16px 0;
            flex-shrink: 0;
        }

        button, label.file-upload-label {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
        }

        label.file-upload-label {
            background-color: var(--primary);
            color: white;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: var(--text);
            border: 1px solid #cbd5e1;
            flex: 1;
        }

        .btn-shuffle {
            background-color: var(--success);
            color: white;
            flex: 1.2;
        }

        #file-input {
            display: none;
        }

        .status-text {
            font-size: 16px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 500;
            padding: 40px 20px;
            line-height: 1.5;
            background: white;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h4 style="margin:0; font-weight: 700; color: #1e293b;">Mobile Card Studio</h4>
    </header>

    <div id="pwa-install-container" class="install-banner">
        <span>📱 Add to Home Screen for native workspace</span>
        <button class="btn-install-now" id="pwa-install-btn">Install</button>
    </div>

    <div id="app-workspace">
        <div class="upload-container-row" id="top-upload-box">
            <label class="file-upload-label" for="file-input" id="upload-label-text">📁 Select PDF File</label>
            <input type="file" id="file-input" accept="application/pdf">
        </div>

        <div id="status" class="status-text">
            Tap the button above to upload a textbook or notes PDF.<br><br>
            <span style="font-size: 13px; font-weight: normal; color: #94a3b8;">Make sure the file contains regular selectable text (not scanned images).</span>
        </div>

        <div class="flashcard-view" id="card-view" style="display: none;">
            <div class="card-image-wrapper" id="image-container"></div>
            <div class="card-metadata-footer">
                <span id="page-stamp">Source: Page --</span>
                <span id="counter-stamp">0 / 0</span>
            </div>
        </div>

        <div class="controls-row" id="navigation-box" style="display: none;">
            <button class="btn-secondary" onclick="navigateDeck(-1)">◀ Prev</button>
            <button class="btn-shuffle" onclick="shuffleDeck()">🔀 Shuffle</button>
            <button class="btn-secondary" onclick="navigateDeck(1)">Next ▶</button>
        </div>
    </div>

    <script>
        var pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js';

        var flashcardAssetsDeck = [];
        var activeCardIndex = 0;

        document.getElementById('file-input').addEventListener('change', handlePDFUpload);

        function handlePDFUpload(event) {
            var file = event.target.files[0];
            if (!file) return;

            var statusLabel = document.getElementById('status');
            var uploadLabel = document.getElementById('upload-label-text');
            
            uploadLabel.innerText = "⏳ Processing...";
            uploadLabel.style.backgroundColor = "#64748b";
            statusLabel.style.display = 'block';
            statusLabel.innerHTML = "<strong>Reading layout structure...</strong><br>Converting paragraphs into cards. Please don't close the tab.";
            
            document.getElementById('card-view').style.display = 'none';
            document.getElementById('navigation-box').style.display = 'none';
            
            flashcardAssetsDeck = [];
            activeCardIndex = 0;

            var fileReader = new FileReader();
            fileReader.onload = function() {
                var typedarray = new Uint8Array(this.result);
                
                pdfjsLib.getDocument({data: typedarray}).promise.then(function(pdf) {
                    var totalPages = pdf.numPages;
                    
                    function processPage(pageNum) {
                        if (pageNum > totalPages) {
                            // Loop complete execution flow finishes here
                            if (flashcardAssetsDeck.length === 0) {
                                uploadLabel.innerText = "📁 Select PDF File";
                                uploadLabel.style.backgroundColor = "#2563eb";
                                statusLabel.innerHTML = "<strong>No readable text content found.</strong><br>This happens if your PDF is made of scanned images or pictures instead of selectable text.";
                                return;
                            }

                            uploadLabel.innerText = "📁 Change PDF";
                            uploadLabel.style.backgroundColor = "#2563eb";
                            statusLabel.style.display = 'none';
                            document.getElementById('card-view').style.display = 'flex';
                            document.getElementById('navigation-box').style.display = 'flex';

                            renderActiveCard();
                            return;
                        }

                        statusLabel.innerHTML = "<strong>Processing Page " + pageNum + " of " + totalPages + "...</strong><br>Building images dynamically.";
                        
                        pdf.getPage(pageNum).then(function(page) {
                            return page.getTextContent().then(function(textContent) {
                                var renderScale = 2.0; 
                                var viewport = page.getViewport({ scale: renderScale });

                                var paragraphs = clusterTextItemsIntoParagraphs(textContent.items, viewport);

                                var renderCanvas = document.createElement('canvas');
                                renderCanvas.width = viewport.width || 600;
                                renderCanvas.height = viewport.height || 800;
                                var renderContext = renderCanvas.getContext('2d');
                                
                                return page.render({ canvasContext: renderContext, viewport: viewport }).promise.then(function() {
                                    for (var i = 0; i < paragraphs.length; i++) {
                                        var p = paragraphs[i];
                                        if (p.text.trim().length < 25) continue;

                                        var padX = 24;
                                        var padY = 24; 
                                        
                                        var x = p.x - padX;
                                        var y = p.y - padY;
                                        var w = p.w + (padX * 2);
                                        var h = p.h + (padY * 2);

                                        x = Math.max(0, x);
                                        y = Math.max(0, y);
                                        w = Math.min(renderCanvas.width - x, w);
                                        h = Math.min(renderCanvas.height - y, h);

                                        if (w <= 20 || h <= 20) continue;

                                        var cropCanvas = document.createElement('canvas');
                                        cropCanvas.width = w;
                                        cropCanvas.height = h;
                                        var ctx = cropCanvas.getContext('2d');

                                        ctx.drawImage(renderCanvas, x, y, w, h, 0, 0, w, h);

                                        flashcardAssetsDeck.push({
                                            canvas: cropCanvas,
                                            page: pageNum
                                        });
                                    }
                                    // Process next page sequentially
                                    processPage(pageNum + 1);
                                });
                            });
                        }).catch(function(error) {
                            console.error(error);
                            showErrorState();
                        });
                    }

                    // Start processing pages from index 1
                    processPage(1);

                }).catch(function(error) {
                    console.error(error);
                    showErrorState();
                });
            };
            
            function showErrorState() {
                uploadLabel.innerText = "📁 Select PDF File";
                uploadLabel.style.backgroundColor = "#2563eb";
                statusLabel.innerHTML = "<strong>Error analyzing file.</strong><br>Please make sure this is a valid unencrypted PDF file layout.";
            }

            fileReader.readAsArrayBuffer(file);
        }

        function clusterTextItemsIntoParagraphs(items, viewport) {
            var paragraphs = [];
            
            var transformedItems = items.map(function(item) {
                var pdfRect = [item.transform[4], item.transform[5], item.transform[4] + item.width, item.transform[5] + item.height];
                var canvasRect = viewport.convertToViewportRectangle(pdfRect);
                var fontSize = Math.abs(item.transform[0] || item.transform[3] || 12);
                
                return {
                    text: item.str,
                    x: Math.min(canvasRect[0], canvasRect[2]),
                    y: Math.min(canvasRect[1], canvasRect[3]) - (fontSize * 0.25), 
                    w: Math.abs(canvasRect[2] - canvasRect[0]),
                    h: Math.abs(canvasRect[3] - canvasRect[1]) + (fontSize * 0.5)
                };
            });

            transformedItems.forEach(function(item) {
                var merged = false;
                for (var i = 0; i < paragraphs.length; i++) {
                    var p = paragraphs[i];
                    var verticalDistance = Math.abs(item.y - (p.y + p.h));
                    var horizontalOverlap = (item.x < p.x + p.w && item.x + item.w > p.x);
                    
                    if (verticalDistance < 24 && horizontalOverlap) {
                        var x1 = Math.min(p.x, item.x);
                        var y1 = Math.min(p.y, item.y);
                        var x2 = Math.max(p.x + p.w, item.x + item.w);
                        var y2 = Math.max(p.y + p.h, item.y + item.h);
                        
                        p.x = x1;
                        p.y = y1;
                        p.w = x2 - x1;
                        p.h = y2 - y1;
                        p.text += " " + item.text;
                        merged = true;
                        break;
                    }
                }
                if (!merged) {
                    paragraphs.push({ x: item.x, y: item.y, w: item.w, h: item.h, text: item.text });
                }
            });

            return paragraphs;
        }

        function renderActiveCard() {
            var container = document.getElementById('image-container');
            container.innerHTML = '';

            var activeCard = flashcardAssetsDeck[activeCardIndex];
            container.appendChild(activeCard.canvas);

            document.getElementById('page-stamp').innerText = "Source: Page " + activeCard.page;
            document.getElementById('counter-stamp').innerText = (activeCardIndex + 1) + " / " + flashcardAssetsDeck.length;
        }

        function navigateDeck(direction) {
            activeCardIndex += direction;
            if (activeCardIndex < 0) activeCardIndex = 0;
            if (activeCardIndex >= flashcardAssetsDeck.length) activeCardIndex = flashcardAssetsDeck.length - 1;
            renderActiveCard();
        }

        function shuffleDeck() {
            if (flashcardAssetsDeck.length <= 1) return;
            flashcardAssetsDeck.sort(function() { return Math.random() - 0.5; });
            activeCardIndex = 0;
            renderActiveCard();
        }

        // --- PWA NATIVE OVERLAY ENGINE LOGIC ---
        var deferredPrompt;
        var installContainer = document.getElementById('pwa-install-container');
        var installBtn = document.getElementById('pwa-install-btn');

        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            installContainer.style.display = 'flex';
        });

        installBtn.addEventListener('click', function() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(choiceResult) {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User approved ecosystem deployment onboarding.');
                }
                installContainer.style.display = 'none';
                deferredPrompt = null;
            });
        });

        window.addEventListener('appinstalled', function() {
            installContainer.style.display = 'none';
            deferredPrompt = null;
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js')
                    .then(function(reg) { console.log('Service Worker Registered Setup Hooked.'); })
                    .catch(function(err) { console.log('Service Worker omitted setup execution:', err); });
            });
        }
    </script>
</body>
</html>
