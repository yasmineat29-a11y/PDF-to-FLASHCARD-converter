<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Paragraph Flashcard Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --success: #10b981;
            --text: #0f172a;
            --text-muted: #64748b;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            padding: 10px;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 10;
            flex-shrink: 0;
        }

        #app-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Responsive flashcard layout container */
        .flashcard-view {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            flex: 1; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* Prevents left and right text clipping by enabling internal scroll styling */
        .card-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: auto; /* Allows panning if the paragraph is wider than the phone screen */
            background: #ffffff;
            -webkit-overflow-scrolling: touch;
        }

        /* Renders image smoothly without distortion or horizontal clipping */
        .card-image-wrapper canvas {
            max-width: 100%;
            height: auto !important;
            object-fit: contain;
            display: block;
        }

        .card-metadata-footer {
            height: 38px;
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* Optimized row for mobile action layouts */
        .controls-row {
            display: flex;
            gap: 8px;
            width: 100%;
            padding: 8px 0 4px 0;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        button, label.file-upload-label {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        label.file-upload-label {
            background-color: var(--primary);
            color: white;
            display: block;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: var(--text);
            border: 1px solid #cbd5e1;
        }

        .btn-shuffle {
            background-color: var(--success);
            color: white;
            flex: 1.2; /* Gives the main action button slightly more tap target area */
        }

        #file-input {
            display: none;
        }

        .status-text {
            font-size: 15px;
            color: var(--text-muted);
            margin: auto;
            text-align: center;
            font-weight: 500;
            padding: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h4 style="margin:0; font-weight: 700; color: #1e293b;">Mobile Card Studio</h4>
    </header>

    <div id="app-workspace">
        <div id="status" class="status-text">📁 Please upload a text PDF to automatically extract paragraph flashcards.</div>

        <div class="flashcard-view" id="card-view" style="display: none;">
            <div class="card-image-wrapper" id="image-container"></div>
            <div class="card-metadata-footer">
                <span id="page-stamp">Source: Page --</span>
                <span id="counter-stamp">0 / 0</span>
            </div>
        </div>

        <div class="controls-row">
            <label id="upload-wrapper" class="file-upload-label" for="file-input">📁 Upload PDF</label>
            <input type="file" id="file-input" accept="application/pdf">

            <button id="prev-btn" class="btn-secondary" style="display:none;" onclick="navigateDeck(-1)">◀ Prev</button>
            <button id="shuffle-btn" class="btn-shuffle" style="display:none;" onclick="shuffleDeck()">🔀 Shuffle</button>
            <button id="next-btn" class="btn-secondary" style="display:none;" onclick="navigateDeck(1)">Next ▶</button>
        </div>
    </div>

    <script>
        var pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js';

        let flashcardAssetsDeck = [];
        let activeCardIndex = 0;

        document.getElementById('file-input').addEventListener('change', handlePDFUpload);

        async function handlePDFUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "Analyzing text coordinates... Please wait.";
            flashcardAssetsDeck = [];
            activeCardIndex = 0;

            const fileReader = new FileReader();
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const pdf = await pdfjsLib.getDocument({data: typedarray}).promise;
                    
                    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                        document.getElementById('status').innerText = `Processing Page ${pageNum} of ${pdf.numPages}...`;
                        const page = await pdf.getPage(pageNum);
                        const textContent = await page.getTextContent();
                        
                        // Scale up for sharper rendering resolution on high-DPI phone displays
                        const renderScale = 2.0; 
                        const viewport = page.getViewport({ scale: renderScale });

                        let paragraphs = clusterTextItemsIntoParagraphs(textContent.items, viewport);

                        const renderCanvas = document.createElement('canvas');
                        renderCanvas.width = viewport.width;
                        renderCanvas.height = viewport.height;
                        const renderContext = renderCanvas.getContext('2d');
                        await page.render({ canvasContext: renderContext, viewport: viewport }).promise;

                        for (let p of paragraphs) {
                            if (p.text.trim().length < 20) continue;

                            // Margin configurations to secure whole text block elements
                            const padX = 24;
                            const padY = 24; 
                            
                            let x = p.x - padX;
                            let y = p.y - padY;
                            let w = p.w + (padX * 2);
                            let h = p.h + (padY * 2);

                            x = Math.max(0, x);
                            y = Math.max(0, y);
                            w = Math.min(viewport.width - x, w);
                            h = Math.min(viewport.height - y, h);

                            if (w <= 15 || h <= 15) continue;

                            const cropCanvas = document.createElement('canvas');
                            cropCanvas.width = w;
                            cropCanvas.height = h;
                            const ctx = cropCanvas.getContext('2d');

                            ctx.drawImage(renderCanvas, x, y, w, h, 0, 0, w, h);

                            flashcardAssetsDeck.push({
                                canvas: cropCanvas,
                                page: pageNum
                            });
                        }
                    }

                    if (flashcardAssetsDeck.length === 0) {
                        document.getElementById('status').innerText = "No readable paragraphs detected. Ensure this PDF contains highlightable text.";
                        return;
                    }

                    document.getElementById('upload-wrapper').style.display = 'none';
                    document.getElementById('card-view').style.display = 'flex';
                    document.getElementById('prev-btn').style.display = 'block';
                    document.getElementById('shuffle-btn').style.display = 'block';
                    document.getElementById('next-btn').style.display = 'block';
                    document.getElementById('status').style.display = 'none';

                    renderActiveCard();

                } catch (error) {
                    console.error(error);
                    document.getElementById('status').innerText = "Error decoding document contents.";
                }
            };
            fileReader.readAsArrayBuffer(file);
        }

        function clusterTextItemsIntoParagraphs(items, viewport) {
            let paragraphs = [];
            
            let transformedItems = items.map(item => {
                let pdfRect = [item.transform[4], item.transform[5], item.transform[4] + item.width, item.transform[5] + item.height];
                let canvasRect = viewport.convertToViewportRectangle(pdfRect);
                let fontSize = Math.abs(item.transform[0] || item.transform[3] || 12);
                
                return {
                    text: item.str,
                    x: Math.min(canvasRect[0], canvasRect[2]),
                    y: Math.min(canvasRect[1], canvasRect[3]) - (fontSize * 0.25), 
                    w: Math.abs(canvasRect[2] - canvasRect[0]),
                    h: Math.abs(canvasRect[3] - canvasRect[1]) + (fontSize * 0.5)
                };
            });

            transformedItems.forEach(item => {
                let merged = false;
                for (let p of paragraphs) {
                    let verticalDistance = Math.abs(item.y - (p.y + p.h));
                    let horizontalOverlap = (item.x < p.x + p.w && item.x + item.w > p.x);
                    
                    if (verticalDistance < 24 && horizontalOverlap) {
                        let x1 = Math.min(p.x, item.x);
                        let y1 = Math.min(p.y, item.y);
                        let x2 = Math.max(p.x + p.w, item.x + item.w);
                        let y2 = Math.max(p.y + p.h, item.y + item.h);
                        
                        p.x = x1;
                        p.y = y1;
                        p.w = x2 - x1;
                        p.h = y2 - y1;
                        p.text += " " + item.text;
                        merged = true;
                        break;
                    }
                }
                if (!merged) {
                    paragraphs.push({ x: item.x, y: item.y, w: item.w, h: item.h, text: item.text });
                }
            });

            return paragraphs;
        }

        function renderActiveCard() {
            const container = document.getElementById('image-container');
            container.innerHTML = '';

            const activeCard = flashcardAssetsDeck[activeCardIndex];
            container.appendChild(activeCard.canvas);

            document.getElementById('page-stamp').innerText = `Source: Page ${activeCard.page}`;
            document.getElementById('counter-stamp').innerText = `${activeCardIndex + 1} / ${flashcardAssetsDeck.length}`;
            
            // Auto-scroll the view block back to the left side when a new card loads
            container.scrollLeft = 0;
            container.scrollTop = 0;
        }

        function navigateDeck(direction) {
            activeCardIndex += direction;
            if (activeCardIndex < 0) activeCardIndex = 0;
            if (activeCardIndex >= flashcardAssetsDeck.length) activeCardIndex = flashcardAssetsDeck.length - 1;
            renderActiveCard();
        }

        function shuffleDeck() {
            if (flashcardAssetsDeck.length <= 1) return;
            flashcardAssetsDeck.sort(() => Math.random() - 0.5);
            activeCardIndex = 0;
            renderActiveCard();
        }
    </script>
</body>
</html>
