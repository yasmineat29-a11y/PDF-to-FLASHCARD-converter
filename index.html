<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcardit - Text Slices</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.2.228/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: #1a1613; color: #e4dcd3; display: flex; flex-direction: column; min-height: 100vh; }
        #app-workspace { padding: 16px; max-width: 600px; margin: 0 auto; width: 100%; }
        .flashcard-view { background: #f4ecd8; border-radius: 16px; width: 100%; height: 350px; overflow: hidden; border: 1px solid #dfd5be; position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.4); touch-action: pan-y; }
        .card-text-wrapper { flex: 1; overflow-y: auto; padding: 28px; text-align: center; color: #110f0e; font-size: 21px; line-height: 1.6; }
        .card-metadata-footer { height: 46px; background: #e9dec4; border-top: 1px solid #dfd5be; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; font-size: 13px; font-weight: bold; color: #5c5243; }
        .controls-row { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button, .file-upload-label { padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-green { background-color: #28a745 !important; color: white; }
        .btn-red { background-color: #dc3545 !important; color: white; }
        .btn-main { background-color: #423831; color: white; }
        .file-upload-label { background-color: #8f7251; color: #f4ecd8; display: block; }
        #file-input { display: none; }
    </style>
</head>
<body>
    <div id="app-workspace">
        <label class="file-upload-label" for="file-input" id="upload-label">📁 Upload PDF/Docx</label>
        <input type="file" id="file-input" accept=".pdf, .docx">
        
        <div id="card-view" class="flashcard-view" style="display: none; margin-top: 20px;">
            <div class="card-text-wrapper"><div id="text-container"></div></div>
            <div class="card-metadata-footer">
                <span id="counter-stamp">0/0</span>
                <span id="feedback-stats">✅0 ❎0 (0%)</span>
            </div>
        </div>

        <div class="controls-row" id="controls" style="display: none;">
            <div style="display: flex; gap: 10px;">
                <button class="btn-green" style="flex:1" onclick="trackFeedback(true)">✅</button>
                <button class="btn-red" style="flex:1" onclick="trackFeedback(false)">❎</button>
            </div>
            <button class="btn-main" onclick="nextInCurrentOrder()">Next Card</button>
            <button class="btn-main" onclick="shuffleDeck()">🔀 Shuffle</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.2.228/pdf.worker.min.js';
        let masterDeck = [], displayDeck = [], activeIndex = 0;

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const arrayBuffer = ev.target.result;
                let text = "";
                if (file.name.endsWith('.docx')) {
                    const res = await mammoth.extractRawText({ arrayBuffer });
                    text = res.value;
                } else {
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const p = await pdf.getPage(i);
                        const content = await p.getTextContent();
                        text += content.items.map(s => s.str).join(" ");
                    }
                }
                masterDeck = text.split('. ').filter(s => s.length > 5).map(s => ({text: s.trim() + ".", know: 0, miss: 0}));
                displayDeck = [...masterDeck];
                activeIndex = 0;
                document.getElementById('card-view').style.display = 'flex';
                document.getElementById('controls').style.display = 'flex';
                render();
            };
            reader.readAsArrayBuffer(file);
        };

        function trackFeedback(isKnown) {
            let card = displayDeck[activeIndex];
            isKnown ? card.know++ : card.miss++;
            render();
        }

        function nextInCurrentOrder() {
            activeIndex = (activeIndex + 1) % displayDeck.length;
            render();
        }

        function shuffleDeck() {
            displayDeck.sort(() => Math.random() - 0.5);
            activeIndex = 0;
            render();
        }

        // Swipe gestures locked to masterDeck sequence
        let startX;
        document.getElementById('card-view').ontouchstart = e => startX = e.touches[0].clientX;
        document.getElementById('card-view').ontouchend = e => {
            let diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                // Find current card in masterDeck to know its original neighbors
                const currentCard = displayDeck[activeIndex];
                const masterIdx = masterDeck.findIndex(c => c === currentCard);
                const nextMasterIdx = (masterIdx + (diff > 0 ? 1 : -1) + masterDeck.length) % masterDeck.length;
                
                // Update display to the card that follows the current one in original order
                const nextCard = masterDeck[nextMasterIdx];
                activeIndex = displayDeck.findIndex(c => c === nextCard);
                render();
            }
        };

        function render() {
            const card = displayDeck[activeIndex];
            document.getElementById('text-container').innerText = card.text;
            let tK = displayDeck.reduce((a, b) => a + b.know, 0);
            let tM = displayDeck.reduce((a, b) => a + b.miss, 0);
            let p = (tK + tM) > 0 ? Math.round((tK / (tK + tM)) * 100) : 0;
            document.getElementById('counter-stamp').innerText = `${activeIndex + 1}/${displayDeck.length}`;
            document.getElementById('feedback-stats').innerText = `✅${tK} ❎${tM} (${p}%)`;
        }
    </script>
</body>
</html>
