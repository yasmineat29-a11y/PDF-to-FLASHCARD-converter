<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcardit - Text Slices</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZsYXNoY2FyZGl0IiwKICAic2hvcnRfbmFtZSI6ICJGbGFzaGNhcmRpdCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjhmYWZjIiwKICAidGhlbWVfY29sb3IiOiAiIzI1NjNlYiIKfQ==">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flashcardit">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.2.228/pdf.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Georgia, serif;
            background-color: #1e1b18; /* Dark Warm Sepia / Charcoal */
            color: #f4ecd8; /* Soft Sepia Cream */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background-color: #2a2421; /* Deep Warm Sepia */
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #3d3530;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        #app-workspace {
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex: 1;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .upload-container-row {
            width: 100%;
            margin-bottom: 16px;
        }

        .flashcard-view {
            background: #2a2421;
            border-radius: 16px;
            width: 100%;
            height: 380px; 
            overflow: hidden;
            border: 1px solid #3d3530;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .card-text-wrapper {
            width: 100%;
            height: 334px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            background: #2a2421;
            box-sizing: border-box;
            padding: 28px;
            text-align: center;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .card-text-content {
            font-size: 20px;
            line-height: 1.6;
            color: #e6dfcc;
            word-wrap: break-word;
            max-width: 100%;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateY(0);
            opacity: 1;
        }

        /* Reading friendly animation state triggers via JS class injection */
        .card-text-content.changing {
            opacity: 0;
            transform: translateY(10px);
        }

        .card-metadata-footer {
            height: 46px;
            background: #231e1b;
            border-top: 1px solid #3d3530;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            font-size: 13px;
            font-weight: bold;
            color: #a39589;
            letter-spacing: 0.05em;
        }

        .controls-row {
            display: flex;
            width: 100%;
            padding: 20px 0;
            gap: 8px;
        }

        button, label.file-upload-label {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:active, label.file-upload-label:active {
            transform: scale(0.98);
        }

        label.file-upload-label {
            background-color: #c99a63; /* Warm Amber Sepia */
            color: #1e1b18;
            box-shadow: 0 4px 12px rgba(201, 154, 99, 0.2);
        }

        .btn-secondary {
            background-color: #3d3530;
            color: #e6dfcc;
            border: 1px solid #4e443e;
        }
        .btn-secondary:hover {
            background-color: #4e443e;
        }

        .btn-danger {
            background-color: #8c3a3a; /* Dark Muted Maroon instead of bright red */
            color: #f4ecd8;
            margin-top: 12px;
        }

        .btn-shuffle {
            background-color: #574c45;
            color: #f4ecd8;
        }

        .btn-next-ordered {
            background-color: #9c7243;
            color: #f4ecd8;
            display: none;
        }

        .btn-save-lib {
            background-color: #9c7243;
            color: #f4ecd8;
            margin-bottom: 16px;
            display: none;
            box-shadow: 0 4px 12px rgba(156, 114, 67, 0.2);
        }

        #file-input {
            display: none;
        }

        .status-text {
            font-size: 16px;
            color: #cdbfa8;
            text-align: center;
            font-weight: bold;
            padding: 40px 20px;
            background: #2a2421;
            border-radius: 16px;
            border: 2px dashed #4e443e;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h4 style="margin:0; font-weight: bold; color: #c99a63; letter-spacing: 0.03em;">Flashcardit Workspace</h4>
    </header>

    <div id="app-workspace">
        <div class="upload-container-row" id="top-upload-box">
            <label class="file-upload-label" for="file-input" id="upload-label-text">📁 Select PDF File</label>
            <input type="file" id="file-input">
            <button class="btn-danger" id="clear-lib-btn" style="display:none;" onclick="clearSavedLibrary()">Reset Deck</button>
        </div>

        <div id="status" class="status-text">
            Tap the button above to upload a textbook or notes PDF.<br><br>
            <span style="font-size: 13px; font-weight: normal; color: #a39589;">Extracts raw textbook text and partitions cleanly at every dot.</span>
        </div>

        <button class="btn-save-lib" id="save-library-btn" onclick="commitDeckToIndexedDB()">📥 Add to Library</button>

        <div class="flashcard-view" id="card-view" style="display: none;">
            <div class="card-text-wrapper">
                <div class="card-text-content" id="text-container"></div>
            </div>
            <div class="card-metadata-footer">
                <span id="page-stamp">Source: Page --</span>
                <span id="counter-stamp">0 / 0</span>
            </div>
        </div>

        <div class="controls-row" id="navigation-box" style="display: none;">
            <button class="btn-secondary" onclick="navigateDeck(-1)">◀ Prev</button>
            <button class="btn-shuffle" id="shuffle-btn" onclick="shuffleDeck()">🔀 Shuffle</button>
            <button class="btn-next-ordered" id="next-ordered-btn" onclick="goToNextInStructuralOrder()">▶ Next in Order</button>
            <button class="btn-secondary" onclick="navigateDeck(1)">Next ▶</button>
        </div>
    </div>

    <script>
        // --- OFFLINE SERVICE WORKER SERVICE ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                var swCode = `
                    const CACHE_NAME = 'flashcardit-cache-v1';
                    const urlsToCache = [
                        location.pathname,
                        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.2.228/pdf.min.js'
                    ];
                    self.addEventListener('install', event => {
                        event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
                    });
                    self.addEventListener('fetch', event => {
                        event.respondWith(caches.match(event.request).then(response => response || fetch(event.request)));
                    });
                `;
                var blob = new Blob([swCode], { type: 'text/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(err) {
                    console.log('SW registration failed:', err);
                });
            });
        }

        var pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = '';

        var flashcardAssetsDeck = [];
        var originalAssetsOrder = []; 
        var activeCardIndex = 0;
        var serializedDeckForDb = []; 

        var dbName = "FlashcarditTextDB";
        var dbVersion = 1;
        var db;

        var request = indexedDB.open(dbName, dbVersion);
        request.onupgradeneeded = function(e) {
            var database = e.target.result;
            if (!database.objectStoreNames.contains("library")) {
                database.createObjectStore("library", { keyPath: "id" });
            }
        };
        request.onsuccess = function(e) {
            db = e.target.result;
            checkSavedLibraryProgress();
        };
        request.onerror = function() {
            console.error("Database initialization failed.");
        };

        document.getElementById('file-input').addEventListener('change', handlePDFUpload);

        function checkSavedLibraryProgress() {
            if (!db) return;
            var transaction = db.transaction(["library"], "readonly");
            var store = transaction.objectStore("library");
            var getReq = store.get("active_deck");

            getReq.onsuccess = function() {
                var record = getReq.result;
                if (record && record.deck && record.deck.length > 0) {
                    flashcardAssetsDeck = record.deck;
                    serializedDeckForDb = record.deck;
                    activeCardIndex = record.activeIndex || 0;

                    originalAssetsOrder = [...record.deck].sort((a, b) => a.uid - b.uid);

                    toggleNextOrderedButtonVisibility();

                    document.getElementById('status').style.display = 'none';
                    document.getElementById('card-view').style.display = 'flex';
                    document.getElementById('navigation-box').style.display = 'flex';
                    document.getElementById('clear-lib-btn').style.display = 'block';
                    document.getElementById('save-library-btn').style.display = 'none';
                    document.getElementById('upload-label-text').innerText = "📁 Change PDF";
                    
                    renderActiveCard();
                }
            };
        }

        function toggleNextOrderedButtonVisibility() {
            var nextOrderedBtn = document.getElementById('next-ordered-btn');
            if (flashcardAssetsDeck.length <= 1 || !flashcardAssetsDeck[activeCardIndex]) {
                nextOrderedBtn.style.display = 'none';
                return;
            }

            var currentCard = flashcardAssetsDeck[activeCardIndex];
            // Check if the card right after our active index is NOT the chronological textbook successor
            if (activeCardIndex < flashcardAssetsDeck.length - 1 && flashcardAssetsDeck[activeCardIndex + 1].uid === currentCard.uid + 1) {
                nextOrderedBtn.style.display = 'none';
            } else if (currentCard.uid >= originalAssetsOrder.length - 1) {
                // If it's the very last text element of the entire PDF structure
                nextOrderedBtn.style.display = 'none';
            } else {
                nextOrderedBtn.style.display = 'block';
            }
        }

        function commitDeckToIndexedDB() {
            if (!db || serializedDeckForDb.length === 0) return;
            
            var saveBtn = document.getElementById('save-library-btn');
            saveBtn.innerText = "⏳ Saving...";

            var transaction = db.transaction(["library"], "readwrite");
            var store = transaction.objectStore("library");
            
            var putReq = store.put({
                id: "active_deck",
                activeIndex: activeCardIndex,
                deck: serializedDeckForDb
            });

            putReq.onsuccess = function() {
                saveBtn.style.display = 'none';
                document.getElementById('clear-lib-btn').style.display = 'block';
            };
        }

        function saveLibraryProgress() {
            if (!db || flashcardAssetsDeck.length === 0) return;
            
            var transaction = db.transaction(["library"], "readwrite");
            var store = transaction.objectStore("library");
            
            var getReq = store.get("active_deck");
            getReq.onsuccess = function() {
                var existingRecord = getReq.result;
                if (existingRecord) {
                    existingRecord.activeIndex = activeCardIndex;
                    existingRecord.deck = flashcardAssetsDeck;
                    store.put(existingRecord);
                }
            };
        }

        function clearSavedLibrary() {
            if (!db) return;
            var transaction = db.transaction(["library"], "readwrite");
            var store = transaction.objectStore("library");
            var clearReq = store.delete("active_deck");
            clearReq.onsuccess = function() {
                location.reload();
            };
        }

        function handlePDFUpload(event) {
            var file = event.target.files[0];
            if (!file) return;

            var statusLabel = document.getElementById('status');
            var uploadLabel = document.getElementById('upload-label-text');
            
            uploadLabel.innerText = "⏳ Extracting...";
            statusLabel.style.display = 'block';
            statusLabel.innerHTML = "<strong>Reading Text Stream...</strong><br>Converting structural document sentences directly into flashcards.";
            
            document.getElementById('card-view').style.display = 'none';
            document.getElementById('navigation-box').style.display = 'none';
            document.getElementById('save-library-btn').style.display = 'none';
            document.getElementById('next-ordered-btn').style.display = 'none';
            
            flashcardAssetsDeck = [];
            originalAssetsOrder = [];
            serializedDeckForDb = [];
            activeCardIndex = 0;

            var fileReader = new FileReader();
            fileReader.onload = function() {
                var typedarray = new Uint8Array(this.result);
                
                pdfjsLib.getDocument({
                    data: typedarray,
                    disableWorker: true,
                    disableAutoFetch: true,
                    disableStream: true
                }).promise.then(function(pdf) {
                    var totalPages = pdf.numPages;
                    var structuralUidCounter = 0;
                    
                    function processPage(pageNum) {
                        if (pageNum > totalPages) {
                            if (flashcardAssetsDeck.length === 0) {
                                uploadLabel.innerText = "📁 Select PDF File";
                                statusLabel.innerHTML = "<strong>No usable text layers discovered.</strong>";
                                return;
                            }

                            uploadLabel.innerText = "📁 Change PDF";
                            statusLabel.style.display = 'none';
                            
                            document.getElementById('card-view').style.display = 'flex';
                            document.getElementById('navigation-box').style.display = 'flex';
                            
                            var saveBtn = document.getElementById('save-library-btn');
                            saveBtn.innerText = "📥 Add to Library";
                            saveBtn.style.display = 'block';

                            renderActiveCard();
                            return;
                        }

                        statusLabel.innerHTML = "<strong>Extracting Sentences: Page " + pageNum + " / " + totalPages + "</strong>";
                        
                        pdf.getPage(pageNum).then(function(page) {
                            return page.getTextContent().then(function(textContent) {
                                var pageRawText = "";
                                
                                for (var i = 0; i < textContent.items.length; i++) {
                                    pageRawText += textContent.items[i].str + " ";
                                }

                                var rawSlices = pageRawText.split('.');
                                for (var j = 0; j < rawSlices.length; j++) {
                                    var sanitizedSentence = rawSlices[j].replace(/^\s+|\s+$/g, '');
                                    
                                    if (sanitizedSentence.length > 6) {
                                        var itemObject = {
                                            uid: structuralUidCounter++,
                                            text: sanitizedSentence + ".",
                                            page: pageNum
                                        };
                                        flashcardAssetsDeck.push(itemObject);
                                        originalAssetsOrder.push({...itemObject});
                                        serializedDeckForDb.push(itemObject);
                                    }
                                }

                                setTimeout(function() { processPage(pageNum + 1); }, 1);
                            });
                        }).catch(function(error) {
                            setTimeout(function() { processPage(pageNum + 1); }, 1);
                        });
                    }

                    processPage(1);

                }).catch(function(error) {
                    showErrorState();
                });
            };
            
            function showErrorState() {
                uploadLabel.innerText = "📁 Select PDF File";
                statusLabel.innerHTML = "<strong>Error reading text characters from this structure.</strong>";
            }

            fileReader.readAsArrayBuffer(file);
        }

        function renderActiveCard() {
            var container = document.getElementById('text-container');
            
            // Apply reading transition animation
            container.classList.add('changing');
            
            setTimeout(function() {
                container.innerHTML = '';

                if(!flashcardAssetsDeck[activeCardIndex]) {
                    container.classList.remove('changing');
                    return;
                }

                var activeCard = flashcardAssetsDeck[activeCardIndex];
                container.innerText = activeCard.text;

                document.getElementById('page-stamp').innerText = "Source: Page " + activeCard.page;
                document.getElementById('counter-stamp').innerText = (activeCardIndex + 1) + " / " + flashcardAssetsDeck.length;
                
                toggleNextOrderedButtonVisibility();
                
                // Reset card scrolling position for reader comfort
                document.querySelector('.card-text-wrapper').scrollTop = 0;
                container.classList.remove('changing');
            }, 150);
        }

        function navigateDeck(direction) {
            if (flashcardAssetsDeck.length === 0) return;
            activeCardIndex += direction;
            if (activeCardIndex < 0) activeCardIndex = 0;
            if (activeCardIndex >= flashcardAssetsDeck.length) activeCardIndex = flashcardAssetsDeck.length - 1;
            
            renderActiveCard();
            saveLibraryProgress();
        }

        function shuffleDeck() {
            if (flashcardAssetsDeck.length <= 1) return;
            
            var historyItems = flashcardAssetsDeck.slice(0, activeCardIndex + 1);
            var remainingItems = flashcardAssetsDeck.slice(activeCardIndex + 1);
            
            remainingItems.sort(function() { return Math.random() - 0.5; });
            flashcardAssetsDeck = historyItems.concat(remainingItems);
            
            renderActiveCard();
            saveLibraryProgress();
        }

        function goToNextInStructuralOrder() {
            if (flashcardAssetsDeck.length === 0) return;

            var currentCard = flashcardAssetsDeck[activeCardIndex];
            var targetUid = currentCard.uid + 1;

            // Find the sequential structural card from the source master list
            var absoluteNextCard = originalAssetsOrder.find(item => item.uid === targetUid);
            if (!absoluteNextCard) return;

            // Strip out any duplicate instance of this upcoming target card in the remaining unviewed stack
            var historyItems = flashcardAssetsDeck.slice(0, activeCardIndex + 1);
            var remainingItems = flashcardAssetsDeck.slice(activeCardIndex + 1);
            var filteredRemaining = remainingItems.filter(item => item.uid !== targetUid);

            // Splice the true consecutive card right in front of the active card position
            flashcardAssetsDeck = historyItems.concat([absoluteNextCard], filteredRemaining);

            // Move pointer forward precisely to our newly inserted chronological slide
            activeCardIndex += 1;

            renderActiveCard();
            saveLibraryProgress();
        }
    </script>
</body>
</html>
