<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcardit - Mobile Paragraph Flashcards</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flashcardit">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --success: #10b981;
            --text: #0f172a;
            --text-muted: #64748b;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        header {
            background-color: var(--card-bg);
            padding: 12px;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 10;
        }

        #app-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            box-sizing: border-box;
        }

        .install-banner {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 10px 14px;
            margin: 0 12px 12px 12px;
            border-radius: 10px;
            display: none;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            color: #1e40af;
        }

        .btn-install-now {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            width: auto;
        }

        .upload-container-row {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .flashcard-view {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            height: 60vh; 
            min-height: 350px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .card-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: hidden;
            background: #ffffff;
            position: relative;
            touch-action: none; 
        }

        .card-image-wrapper img {
            max-width: 100% !important;
            max-height: 100% !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain;
            display: block;
            transform-origin: center center;
            will-change: transform;
            transition: transform 0.05s ease-out;
        }

        .card-metadata-footer {
            height: 38px;
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
            z-index: 5;
        }

        .controls-row {
            display: flex;
            gap: 8px;
            width: 100%;
            padding: 16px 0;
            flex-shrink: 0;
        }

        button, label.file-upload-label {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
        }

        label.file-upload-label {
            background-color: var(--primary);
            color: white;
            flex: 2;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: var(--text);
            border: 1px solid #cbd5e1;
            flex: 1;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
            flex: 1;
            padding: 14px 6px;
            font-size: 13px;
        }

        .btn-shuffle {
            background-color: #64748b;
            color: white;
            flex: 1.2;
        }

        .btn-save-lib {
            background-color: var(--success);
            color: white;
            margin-bottom: 12px;
            display: none;
        }

        #file-input {
            display: none;
        }

        .status-text {
            font-size: 16px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 500;
            padding: 40px 20px;
            line-height: 1.5;
            background: white;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
            margin-top: 20px;
        }
        
        .zoom-tip {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(15, 23, 42, 0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <h4 style="margin:0; font-weight: 700; color: #1e293b;">Flashcardit Workspace</h4>
    </header>

    <div id="pwa-install-container" class="install-banner">
        <span>📱 Add Flashcardit to Home Screen</span>
        <button class="btn-install-now" id="pwa-install-btn">Install</button>
    </div>

    <div id="app-workspace">
        <div class="upload-container-row" id="top-upload-box">
            <label class="file-upload-label" for="file-input" id="upload-label-text">📁 Select PDF File</label>
            <input type="file" id="file-input" accept="application/pdf">
            <button class="btn-danger" id="clear-lib-btn" style="display:none;" onclick="clearSavedLibrary()">Reset Deck</button>
        </div>

        <div id="status" class="status-text">
            Tap the button above to upload a textbook or notes PDF.<br><br>
            <span style="font-size: 13px; font-weight: normal; color: #94a3b8;">Your dynamic cards and progress library save continuously without mobile limits!</span>
        </div>

        <button class="btn-save-lib" id="save-library-btn" onclick="commitDeckToIndexedDB()">📥 Add to Library</button>

        <div class="flashcard-view" id="card-view" style="display: none;">
            <div class="zoom-tip">Pinch to Zoom / Drag</div>
            <div class="card-image-wrapper" id="image-container"></div>
            <div class="card-metadata-footer">
                <span id="page-stamp">Source: Page --</span>
                <span id="counter-stamp">0 / 0</span>
            </div>
        </div>

        <div class="controls-row" id="navigation-box" style="display: none;">
            <button class="btn-secondary" onclick="navigateDeck(-1)">◀ Prev</button>
            <button class="btn-shuffle" onclick="shuffleDeck()">🔀 Shuffle</button>
            <button class="btn-secondary" onclick="navigateDeck(1)">Next ▶</button>
        </div>
    </div>

    <script>
        var pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = '';

        var flashcardAssetsDeck = [];
        var activeCardIndex = 0;
        var serializedDeckForDb = []; // Staging array for pending library commits

        // Touch Zoom & Pan UI variables 
        var currentScale = 1;
        var startScale = 1;
        var startDistance = 0;
        var currentPanX = 0;
        var currentPanY = 0;
        var startPanX = 0;
        var startPanY = 0;
        var isDragging = false;

        var activeObjectUrls = [];

        // --- STABLE INDEXEDDB BLOB STORAGE ENGINE ---
        var dbName = "FlashcarditDB";
        var dbVersion = 1;
        var db;

        var request = indexedDB.open(dbName, dbVersion);
        request.onupgradeneeded = function(e) {
            var database = e.target.result;
            if (!database.objectStoreNames.contains("library")) {
                database.createObjectStore("library", { keyPath: "id" });
            }
        };
        request.onsuccess = function(e) {
            db = e.target.result;
            checkSavedLibraryProgress();
        };
        request.onerror = function() {
            console.error("Database initialization failed.");
        };

        document.getElementById('file-input').addEventListener('change', handlePDFUpload);

        function cleanupObjectUrls() {
            activeObjectUrls.forEach(function(url) {
                URL.revokeObjectURL(url);
            });
            activeObjectUrls = [];
        }

        function checkSavedLibraryProgress() {
            if (!db) return;
            var transaction = db.transaction(["library"], "readonly");
            var store = transaction.objectStore("library");
            var getReq = store.get("active_deck");

            getReq.onsuccess = function() {
                var record = getReq.result;
                if (record && record.deck && record.deck.length > 0) {
                    cleanupObjectUrls();
                    flashcardAssetsDeck = [];
                    serializedDeckForDb = record.deck;
                    activeCardIndex = record.activeIndex || 0;

                    record.deck.forEach(function(item) {
                        var objectUrl = URL.createObjectURL(item.blob);
                        activeObjectUrls.push(objectUrl);

                        flashcardAssetsDeck.push({
                            src: objectUrl,
                            page: item.page
                        });
                    });

                    document.getElementById('status').style.display = 'none';
                    document.getElementById('card-view').style.display = 'flex';
                    document.getElementById('navigation-box').style.display = 'flex';
                    document.getElementById('clear-lib-btn').style.display = 'block';
                    document.getElementById('save-library-btn').style.display = 'none'; // Hidden when looking at an active saved library
                    document.getElementById('upload-label-text').innerText = "📁 Change PDF";
                    
                    renderActiveCard();
                }
            };
        }

        // Commits the currently staged presentation deck into database memory
        function commitDeckToIndexedDB() {
            if (!db || serializedDeckForDb.length === 0) return;
            
            var saveBtn = document.getElementById('save-library-btn');
            saveBtn.innerText = "⏳ Saving into Storage...";
            saveBtn.style.backgroundColor = "#64748b";

            var transaction = db.transaction(["library"], "readwrite");
            var store = transaction.objectStore("library");
            
            var putReq = store.put({
                id: "active_deck",
                activeIndex: activeCardIndex,
                deck: serializedDeckForDb
            });

            putReq.onsuccess = function() {
                saveBtn.style.display = 'none';
                document.getElementById('clear-lib-btn').style.display = 'block';
                alert("🎉 Flashcards successfully committed to your offline library!");
            };

            putReq.onerror = function() {
                saveBtn.innerText = "❌ Storage Failed";
                saveBtn.style.backgroundColor = "#ef4444";
            };
        }

        function saveLibraryProgress() {
            if (!db || flashcardAssetsDeck.length === 0) return;
            
            // Check if the deck is already saved to library before updating position index automatically
            var transaction = db.transaction(["library"], "readwrite");
            var store = transaction.objectStore("library");
            
            var getReq = store.get("active_deck");
            getReq.onsuccess = function() {
                var existingRecord = getReq.result;
                if (existingRecord) {
                    existingRecord.activeIndex = activeCardIndex;
                    store.put(existingRecord);
                }
            };
        }

        function clearSavedLibrary() {
            if (!db) return;
            var transaction = db.transaction(["library"], "readwrite");
            var store = transaction.objectStore("library");
            var clearReq = store.delete("active_deck");
            clearReq.onsuccess = function() {
                cleanupObjectUrls();
                location.reload();
            };
        }

        function handlePDFUpload(event) {
            var file = event.target.files[0];
            if (!file) return;

            var statusLabel = document.getElementById('status');
            var uploadLabel = document.getElementById('upload-label-text');
            
            uploadLabel.innerText = "⏳ Processing...";
            uploadLabel.style.backgroundColor = "#64748b";
            statusLabel.style.display = 'block';
            statusLabel.innerHTML = "<strong>Reading layout structure...</strong><br>Converting paragraphs into cards. Please don't close the tab.";
            
            document.getElementById('card-view').style.display = 'none';
            document.getElementById('navigation-box').style.display = 'none';
            document.getElementById('save-library-btn').style.display = 'none';
            
            cleanupObjectUrls();
            flashcardAssetsDeck = [];
            serializedDeckForDb = [];
            activeCardIndex = 0;

            var fileReader = new FileReader();
            fileReader.onload = function() {
                var typedarray = new Uint8Array(this.result);
                
                pdfjsLib.getDocument({
                    data: typedarray,
                    disableWorker: true,
                    disableAutoFetch: true,
                    disableStream: true
                }).promise.then(function(pdf) {
                    var totalPages = pdf.numPages;
                    
                    function processPage(pageNum) {
                        if (pageNum > totalPages) {
                            if (flashcardAssetsDeck.length === 0) {
                                uploadLabel.innerText = "📁 Select PDF File";
                                uploadLabel.style.backgroundColor = "#2563eb";
                                statusLabel.innerHTML = "<strong>No readable text content found.</strong><br>This happens if your PDF is made of scanned images instead of selectable text.";
                                return;
                            }

                            // Show presentation views + present the "Add to Library" options layer
                            uploadLabel.innerText = "📁 Change PDF";
                            uploadLabel.style.backgroundColor = "#2563eb";
                            statusLabel.style.display = 'none';
                            
                            document.getElementById('card-view').style.display = 'flex';
                            document.getElementById('navigation-box').style.display = 'flex';
                            
                            var saveBtn = document.getElementById('save-library-btn');
                            saveBtn.innerText = "📥 Add to Library";
                            saveBtn.style.backgroundColor = "var(--success)";
                            saveBtn.style.display = 'block';

                            renderActiveCard();
                            return;
                        }

                        statusLabel.innerHTML = "<strong>Processing Page " + pageNum + " of " + totalPages + "...</strong><br>Building paragraph structures.";
                        
                        pdf.getPage(pageNum).then(function(page) {
                            return page.getTextContent().then(function(textContent) {
                                var renderScale = 1.5; 
                                var viewport = page.getViewport({ scale: renderScale });
                                var paragraphs = clusterTextItemsIntoParagraphs(textContent.items, viewport);

                                if (paragraphs.length === 0) {
                                    setTimeout(function() { processPage(pageNum + 1); }, 1);
                                    return;
                                }

                                var renderCanvas = document.createElement('canvas');
                                renderCanvas.width = viewport.width || 600;
                                renderCanvas.height = viewport.height || 800;
                                var renderContext = renderCanvas.getContext('2d');
                                
                                var renderTask = page.render({ canvasContext: renderContext, viewport: viewport });
                                return renderTask.promise.then(function() {
                                    var generatedBlobs = [];

                                    for (var i = 0; i < paragraphs.length; i++) {
                                        var p = paragraphs[i];
                                        if (p.text.trim().length < 25) continue;

                                        var padX = 20;
                                        var padY = 20; 
                                        
                                        var x = p.x - padX;
                                        var y = p.y - padY;
                                        var w = p.w + (padX * 2);
                                        var h = p.h + (padY * 2);

                                        x = Math.max(0, x);
                                        y = Math.max(0, y);
                                        w = Math.min(renderCanvas.width - x, w);
                                        h = Math.min(renderCanvas.height - y, h);

                                        if (w <= 20 || h <= 20) continue;

                                        var cropCanvas = document.createElement('canvas');
                                        cropCanvas.width = w;
                                        cropCanvas.height = h;
                                        var ctx = cropCanvas.getContext('2d');
                                        ctx.drawImage(renderCanvas, x, y, w, h, 0, 0, w, h);

                                        generatedBlobs.push({
                                            canvas: cropCanvas,
                                            page: pageNum
                                        });
                                    }

                                    function serializeBlobsSequentially(index) {
                                        if (index >= generatedBlobs.length) {
                                            setTimeout(function() { processPage(pageNum + 1); }, 1);
                                            return;
                                        }
                                        var target = generatedBlobs[index];
                                        target.canvas.toBlob(function(blob) {
                                            if (blob) {
                                                var objUrl = URL.createObjectURL(blob);
                                                activeObjectUrls.push(objUrl);
                                                
                                                flashcardAssetsDeck.push({
                                                    src: objUrl,
                                                    page: target.page
                                                });

                                                serializedDeckForDb.push({
                                                    page: target.page,
                                                    blob: blob
                                                });
                                            }
                                            serializeBlobsSequentially(index + 1);
                                        }, "image/png");
                                    }

                                    serializeBlobsSequentially(0);
                                });
                            });
                        }).catch(function(error) {
                            console.error(error);
                            setTimeout(function() { processPage(pageNum + 1); }, 1);
                        });
                    }

                    processPage(1);

                }).catch(function(error) {
                    console.error(error);
                    showErrorState();
                });
            };
            
            function showErrorState() {
                uploadLabel.innerText = "📁 Select PDF File";
                uploadLabel.style.backgroundColor = "#2563eb";
                statusLabel.innerHTML = "<strong>Error analyzing file.</strong><br>Please make sure this is a valid unencrypted textbook PDF file layout.";
            }

            fileReader.readAsArrayBuffer(file);
        }

        function clusterTextItemsIntoParagraphs(items, viewport) {
            var paragraphs = [];
            if (!items || items.length === 0) return paragraphs;
            
            var transformedItems = items.map(function(item) {
                var pdfRect = [item.transform[4], item.transform[5], item.transform[4] + item.width, item.transform[5] + item.height];
                var canvasRect = viewport.convertToViewportRectangle(pdfRect);
                var fontSize = Math.abs(item.transform[0] || item.transform[3] || 12);
                
                return {
                    text: item.str,
                    x: Math.min(canvasRect[0], canvasRect[2]),
                    y: Math.min(canvasRect[1], canvasRect[3]) - (fontSize * 0.25), 
                    w: Math.abs(canvasRect[2] - canvasRect[0]),
                    h: Math.abs(canvasRect[3] - canvasRect[1]) + (fontSize * 0.5)
                };
            });

            transformedItems.forEach(function(item) {
                var merged = false;
                for (var i = 0; i < paragraphs.length; i++) {
                    var p = paragraphs[i];
                    var verticalDistance = Math.abs(item.y - (p.y + p.h));
                    var horizontalOverlap = (item.x < p.x + p.w && item.x + item.w > p.x);
                    
                    if (verticalDistance < 24 && horizontalOverlap) {
                        var x1 = Math.min(p.x, item.x);
                        var y1 = Math.min(p.y, item.y);
                        var x2 = Math.max(p.x + p.w, item.x + item.w);
                        var y2 = Math.max(p.y + p.h, item.y + item.h);
                        
                        p.x = x1;
                        p.y = y1;
                        p.w = x2 - x1;
                        p.h = y2 - y1;
                        p.text += " " + item.text;
                        merged = true;
                        break;
                    }
                }
                if (!merged) {
                    paragraphs.push({ x: item.x, y: item.y, w: item.w, h: item.h, text: item.text });
                }
            });

            return paragraphs;
        }

        function renderActiveCard() {
            var container = document.getElementById('image-container');
            container.innerHTML = '';

            if(!flashcardAssetsDeck[activeCardIndex]) return;

            var activeCard = flashcardAssetsDeck[activeCardIndex];
            
            var imgElement = document.createElement('img');
            imgElement.src = activeCard.src;
            container.appendChild(imgElement);

            document.getElementById('page-stamp').innerText = "Source: Page " + activeCard.page;
            document.getElementById('counter-stamp').innerText = (activeCardIndex + 1) + " / " + flashcardAssetsDeck.length;

            resetZoomState(imgElement);
            setupZoomGestures(container, imgElement);
        }

        function resetZoomState(target) {
            currentScale = 1;
            currentPanX = 0;
            currentPanY = 0;
            if(target) {
                target.style.transform = `translate(0px, 0px) scale(1)`;
            }
        }

        function setupZoomGestures(wrapper, element) {
            wrapper.ontouchstart = function(e) {
                if (e.touches.length === 2) {
                    startScale = currentScale;
                    startDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                } else if (e.touches.length === 1) {
                    isDragging = true;
                    startPanX = e.touches[0].pageX - currentPanX;
                    startPanY = e.touches[0].pageY - currentPanY;
                }
            };

            wrapper.ontouchmove = function(e) {
                if (e.touches.length === 2) {
                    isDragging = false;
                    var newDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    currentScale = Math.min(Math.max(startScale * (newDistance / startDistance), 1), 4);
                } else if (e.touches.length === 1 && isDragging && currentScale > 1) {
                    currentPanX = e.touches[0].pageX - startPanX;
                    currentPanY = e.touches[0].pageY - startPanY;
                }
                
                if (currentScale === 1) {
                    currentPanX = 0;
                    currentPanY = 0;
                }
                
                element.style.transform = `translate(${currentPanX}px, ${currentPanY}px) scale(${currentScale})`;
            };

            wrapper.ontouchend = function(e) {
                if (e.touches.length < 2) startDistance = 0;
                if (e.touches.length === 0) isDragging = false;
            };
        }

        function navigateDeck(direction) {
            if (flashcardAssetsDeck.length === 0) return;
            activeCardIndex += direction;
            if (activeCardIndex < 0) activeCardIndex = 0;
            if (activeCardIndex >= flashcardAssetsDeck.length) activeCardIndex = flashcardAssetsDeck.length - 1;
            
            renderActiveCard();
            saveLibraryProgress();
        }

        function shuffleDeck() {
            if (flashcardAssetsDeck.length <= 1) return;
            
            flashcardAssetsDeck.sort(function() { return Math.random() - 0.5; });
            activeCardIndex = 0;
            
            renderActiveCard();
            
            if (db) {
                var transaction = db.transaction(["library"], "readwrite");
                var store = transaction.objectStore("library");
                var getReq = store.get("active_deck");
                getReq.onsuccess = function() {
                    var record = getReq.result;
                    if(record) {
                        record.deck.sort(function() { return 0.5 - Math.random(); });
                        record.activeIndex = 0;
                        store.put(record);
                    }
                };
            }
        }

        // --- PWA INSTALL ENGINE ---
        var deferredPrompt;
        var installContainer = document.getElementById('pwa-install-container');
        var installBtn = document.getElementById('pwa-install-btn');

        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            installContainer.style.display = 'flex';
        });

        installBtn.addEventListener('click', function() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function() {
                installContainer.style.display = 'none';
                deferredPrompt = null;
            });
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').catch(function() {});
            });
        }
    </script>
</body>
</html>
